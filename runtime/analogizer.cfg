# openfpgaOS shared Analogizer configuration
#
# This file is seeded into data slot 8 so analogcfg can save a shared
# nonvolatile configuration. All settings below are commented out on
# purpose: a comment-only file leaves the Pocket menu/interact.json
# defaults active until analogcfg or the user writes real values.
#
# Remove the leading "#" on any setting you want to force.
#
# enabled: on/off
# enabled=off
#
# video: rgb, rgsb, component, composite, svideo, yc_ntsc, yc_pal,
#        vga, rgbhv, scart, sc_0pct, sc_50pct, sc_hq2x
# Older "_off" aliases are accepted but keep the Pocket panel visible.
# video=rgb
#
# snac: none, db15, db15_fast, nes, snes, snes_swap, pce_2btn,
#       pce_6btn, pce_multitap, psx, psx_fast, psx_analog,
#       psx_analog_fast
# snac=none
#
# assignment: snac_p1, snac_p2, dual, swap
# assignment=snac_p2
#
# h_offset: -32..31
# v_offset: -16..15
# h_offset=0
# v_offset=0
